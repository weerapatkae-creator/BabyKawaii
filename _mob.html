<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabyKawaii — รีดีไซน์ระบบจัดการร้าน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="bk/styles.css?v=11" />
  <style>
    html, body { background: #FAF7F9; }
    body[data-theme="dark"] { background: #151318; }
    #root { min-height: 100vh; }
  </style>
  <style id="mobforce">
    #root{background:#cdc7d2!important;min-height:100vh;padding:18px 0}
    .bk-app{max-width:430px!important;margin:0 auto!important;min-height:860px!important;overflow:hidden!important;border-radius:26px!important;box-shadow:0 18px 50px rgba(0,0,0,.25)!important;background:var(--bg)!important}
    .bk-sidebar{display:none!important}
    .bk-main{margin-left:0!important}
    .bk-stats{grid-template-columns:repeat(2,1fr)!important}
    .bk-grid-2,.bk-grid-3,.bk-grid-3b{grid-template-columns:1fr!important}
    .bk-profit-grid{grid-template-columns:repeat(2,1fr)!important}
    .bk-hide-mobile{display:none!important}
    .bk-menu-btn{display:flex!important}
    .bk-inbox{grid-template-columns:1fr!important}
    .bk-inbox__thread{display:none!important}
    .bk-inbox.is-thread .bk-inbox__list{display:none!important}
    .bk-inbox.is-thread .bk-inbox__thread{display:flex!important}
    .bk-thread__back{display:inline-flex!important}
  </style>
</head>
<body data-theme="light" data-emoji="on">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="bk/data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="bk/icons.jsx"></script>
  <script type="text/babel" src="bk/components.jsx"></script>
  <script type="text/babel" src="bk/shell.jsx"></script>
  <script type="text/babel" src="bk/screens-dashboard.jsx"></script>
  <script type="text/babel" src="bk/screens-catalog.jsx"></script>
  <script type="text/babel" src="bk/screens-commerce.jsx"></script>
  <script type="text/babel" src="bk/screens-inbox.jsx"></script>
  <script type="text/babel" src="bk/screens-marketing.jsx"></script>
  <script type="text/babel" src="bk/screens-misc.jsx"></script>
  <script type="text/babel" src="bk/app.jsx"></script>
</body>
</html>
