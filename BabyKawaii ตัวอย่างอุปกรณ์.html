<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabyKawaii — ตัวอย่างตามอุปกรณ์</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; height: 100%; background: #ECEAEF; font-family: 'Noto Sans Thai', system-ui, sans-serif; }
    #root { height: 100vh; }
    .dev-iframe { width: 100%; height: 100%; border: none; display: block; background: #FAF7F9; }
  </style>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#FBE9EE"/>
      <rect x="30" y="22" width="40" height="56" rx="8" fill="#E8869B"/>
      <rect x="36" y="30" width="28" height="40" rx="3" fill="#fff"/>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>

  <script type="text/babel">
    const APP = encodeURI("BabyKawaii รีดีไซน์.html");

    function Showcase() {
      return (
        <DesignCanvas>
          <DCSection id="devices" title="BabyKawaii — ตัวอย่างตามอุปกรณ์"
            subtitle="ดีไซน์เดียวกัน ปรับตัวอัตโนมัติทุกหน้าจอ · เลื่อน/ซูมแคนวาสได้ · กดเปิดเต็มจอที่มุมการ์ด">

            <DCArtboard id="ios" label="iOS · iPhone" width={470} height={912}>
              <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <IOSDevice width={390} height={844}>
                  <div style={{ height: "100%", paddingTop: 52, paddingBottom: 26, boxSizing: "border-box" }}>
                    <iframe className="dev-iframe" src={APP} title="iOS preview" />
                  </div>
                </IOSDevice>
              </div>
            </DCArtboard>

            <DCArtboard id="android" label="Android · Pixel" width={492} height={960}>
              <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <AndroidDevice width={412} height={892}>
                  <iframe className="dev-iframe" src={APP} title="Android preview" />
                </AndroidDevice>
              </div>
            </DCArtboard>

            <DCArtboard id="pc" label="PC · เดสก์ท็อป" width={1280} height={812}>
              <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <ChromeWindow width={1200} height={748} url="babykawaii.shop/dashboard"
                  tabs={[{ title: "BabyKawaii · จัดการร้าน" }, { title: "TikTok Shop" }]}>
                  <iframe className="dev-iframe" src={APP} title="PC preview" />
                </ChromeWindow>
              </div>
            </DCArtboard>

          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Showcase />);
  </script>
</body>
</html>
